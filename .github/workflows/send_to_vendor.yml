name: Send 850 EDI to Vendors

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

  # Auto trigger after EDI Processor completes successfully
  workflow_run:
    workflows: ["EDI Processor — Generate 850 EDI"]
    types:
      - completed

jobs:
  send-to-vendor:
    name: Route 850 EDI to Vendor Inboxes
    runs-on: ubuntu-latest

    # Only run if EDI Processor succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Wait 2 minutes before sending to vendor
      - name: Wait 2 minutes
        run: |
          echo "Waiting 2 minutes before routing to vendor..."
          sleep 120

      - name: Send EDI to Vendor Inboxes
        run: python3 scripts/send_to_vendor.py

      - name: Verify vendor folders
        if: success()
        run: |
          echo "Checking vendor bucket folders..."
          aws s3 ls s3://edi-pipeline-vendors-dev/tesla/inbox/   || true
          aws s3 ls s3://edi-pipeline-vendors-dev/apple/inbox/   || true
          aws s3 ls s3://edi-pipeline-vendors-dev/samsung/inbox/ || true
          aws s3 ls s3://edi-pipeline-vendors-dev/dell/inbox/    || true

      - name: Job Summary
        if: always()
        run: |
          echo "## Send to Vendor Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Completed at | $(date) |" >> $GITHUB_STEP_SUMMARY
